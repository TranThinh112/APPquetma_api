name: appqr1
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8  # Icon kiểu iOS (Cupertino style)
  url_launcher: ^6.3.2    # Mở URL (web, tel, mail, app ngoài)
  mobile_scanner: ^7.2.0 # Quét QR / Barcode bằng camera
  audioplayers: ^6.1.0    # Phát âm thanh (mp3, wav...)
  intl: ^0.19.0    # Format ngày giờ, số, đa ngôn ngữ
  path: ^1.8.3  # Xử lý đường dẫn file trong du an
  http: ^1.2.0   # Gọi API (GET, POST...), lay url server, cac function
  qr_flutter: ^4.1.0   # Tạo QR code hiển thị trên UI
  barcode_widget: ^2.0.3   # Tạo barcode (EAN, Code128...)
  flutter_lints: ^6.0.0  # Rule lint giúp code sạch, chuẩn
  share_plus: ^7.2.1   # Chia sẻ nội dung (text, file...)
  path_provider: ^2.1.2   # Lấy thư mục hệ thống (cache, document..
  diacritic: ^0.1.3  #dùng xóa dấu triếng việt cho trang tao don/ search
  shared_preferences: ^2.2.2 #luu du lieu local cua app vao may


dev_dependencies:
  flutter_test:
    sdk: flutter

  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#EE4D2D"
  adaptive_icon_foreground: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/orders_db.db
    - assets/beep.mp3
    - assets/error.mp3
    - assets/user_avatar.jpg

